<!DOCTYPE html>
<html>
<head>
<title>OTP Verification</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #1f4037, #99f2c8);
}

.box {
  background: white;
  padding: 25px;
  margin: 100px auto;
  width: 320px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 95%;
  padding: 12px;
  background: #00c853;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #00a844;
}
</style>

</head>

<body>

<div class="box">

<h2>🔐 Forgot Password</h2>

<input type="text" id="number" placeholder="Enter Mobile Number"><br>

<button onclick="sendOTP()">Send OTP</button>

<input type="text" id="otp" placeholder="Enter OTP"><br>

<button onclick="verifyOTP()">Verify OTP</button>

</div>

<script>

function sendOTP() {
  var number = document.getElementById("number").value;

  if(number.length != 11){
    alert("Enter valid 11 digit number!");
    return;
  }

  // random OTP
  var otp = Math.floor(1000 + Math.random() * 9000);

  // save OTP + number
  localStorage.setItem("otp", otp);
  localStorage.setItem("otpNumber", number);

  alert("OTP sent successfully!\n(DEV MODE OTP: " + otp + ")");
}

function verifyOTP() {
  var userOTP = document.getElementById("otp").value;

  var realOTP = localStorage.getItem("otp");

  if(userOTP == realOTP){
    alert("✅ Verified! Reset Password Now");

    window.location.href = "reset.html";
  } else {
    alert("❌ Wrong OTP");
  }
}

</script>

</body>
</html>

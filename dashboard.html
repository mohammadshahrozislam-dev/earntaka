<!DOCTYPE html>
<html>
<head>
<title>Trading Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0e11;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  background: #161a1e;
  text-align: center;
  font-size: 20px;
  color: #f0b90b;
}

/* CARD SECTION */
.cards {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.card {
  background: #161a1e;
  padding: 15px;
  margin: 10px;
  width: 180px;
  border-radius: 10px;
  text-align: center;
}

/* PRICE COLOR */
.up {
  color: #00ff88;
}

.down {
  color: red;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  background: #f0b90b;
  border: none;
  color: black;
  border-radius: 5px;
}

/* GRAPH */
#graph {
  width: 100%;
  height: 300px;
  margin-top: 20px;
}

/* FAKE DATA PANEL */
.panel {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #161a1e;
  margin-top: 10px;
}

.box {
  text-align: center;
}
</style>

</head>

<body>

<div class="header">📊 LIVE TRADING SYSTEM</div>

<div class="panel">
<div class="box">Users<br><b id="users">1200</b></div>
<div class="box">Trades<br><b id="trades">350</b></div>
<div class="box">Volume<br><b id="volume">$12000</b></div>
</div>

<div class="cards">

<div class="card">
<h3>ELITE</h3>
<p id="p1">$3.00</p>
<p id="s1" class="up">▲ UP</p>
<button>Buy</button>
</div>

<div class="card">
<h3>PREMIUM</h3>
<p id="p2">$2.00</p>
<p id="s2" class="up">▲ UP</p>
<button>Buy</button>
</div>

<div class="card">
<h3>BASIC</h3>
<p id="p3">$1.00</p>
<p id="s3" class="up">▲ UP</p>
<button>Buy</button>
</div>

</div>

<canvas id="graph"></canvas>

<script>
var prices = [3,2,1];

var min = [2.90,1.95,1.00];
var max = [3.22,2.12,1.32];

function updatePrices() {
  for(let i=0;i<prices.length;i++) {

    let change = (Math.random()*0.15 - 0.10);
    prices[i] += change;

    // LIMIT CONTROL
    if(prices[i] < min[i]) prices[i] = min[i];
    if(prices[i] > max[i]) prices[i] = max[i];

    let el = document.getElementById("p"+(i+1));
    let status = document.getElementById("s"+(i+1));

    el.innerText = "$" + prices[i].toFixed(2);

    if(change > 0){
      status.innerText = "▲ UP";
      status.className = "up";
    } else {
      status.innerText = "▼ DOWN";
      status.className = "down";
    }
  }

  // fake stats
  document.getElementById("users").innerText =
    1000 + Math.floor(Math.random()*500);

  document.getElementById("trades").innerText =
    300 + Math.floor(Math.random()*200);

  document.getElementById("volume").innerText =
    "$" + (10000 + Math.floor(Math.random()*5000));
}

/* GRAPH */
var canvas = document.getElementById("graph");
var ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = 300;

var data = [];
for(let i=0;i<100;i++) data.push(150);

function drawGraph() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.strokeStyle = "#f0b90b";

  for(let i=0;i<data.length;i++) {
    ctx.lineTo(i*10, data[i]);
  }

  ctx.stroke();

  data.shift();
  data.push(data[data.length-1] + (Math.random()*10-5));
}

setInterval(function(){
  updatePrices();
  drawGraph();
},1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.title {
  font-size: 30px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: 10px;
  display: inline-block;
  width: 180px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

button {
  padding: 10px;
  background: #00c6ff;
  color: white;
  border: none;
  border-radius: 8px;
}

#graph {
  width: 100%;
  height: 300px;
  margin-top: 30px;
  background: rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<h1 class="title">🔥 Premium Card Shop 🔥</h1>

<div class="card">
<h3>Elite Premium Card</h3>
<p id="p1">Price: $3.00</p>
<a href="bkash.html"><button>Buy Now</button></a>
</div>

<div class="card">
<h3>Premium Card</h3>
<p id="p2">Price: $2.00</p>
<a href="bkash.html"><button>Buy Now</button></a>
</div>

<div class="card">
<h3>Basic Card</h3>
<p id="p3">Price: $1.00</p>
<a href="bkash.html"><button>Buy Now</button></a>
</div>

<canvas id="graph"></canvas>

<script>
var canvas = document.getElementById("graph");
var ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = 300;

var prices = [3, 2, 1];
var data = [];

for(let i=0;i<100;i++) data.push(100);

function updatePrices() {
  for(let i=0;i<prices.length;i++) {
    var change = (Math.random() * 0.15);

    if(Math.random() > 0.5) {
      prices[i] += change;
    } else {
      prices[i] -= 0.10;
    }

    if(prices[i] < 0.5) prices[i] = 0.5;

    document.getElementById("p"+(i+1)).innerText =
      "Price: $" + prices[i].toFixed(2);
  }
}

function drawGraph() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.strokeStyle = "#00ffcc";
  ctx.lineWidth = 2;

  for(let i=0;i<data.length;i++) {
    ctx.lineTo(i*10, data[i]);
  }

  ctx.stroke();

  data.shift();
  var last = data[data.length-1];
  var change = (Math.random()*10) - 5;
  data.push(last + change);
}

setInterval(function(){
  updatePrices();
  drawGraph();
}, 1000);
</script>

</body>
</html>

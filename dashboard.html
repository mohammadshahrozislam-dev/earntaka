<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>

<body>

<h2>Dashboard</h2>

<p>Balance: <span id="balance">0</span></p>

<button onclick="earn()">Earn +10</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfl7V_-yp5HvfUd00h-RTdNmvXNu7I37o",
  authDomain: "project-one-5c61e.firebaseapp.com",
  projectId: "project-one-5c61e",
  storageBucket: "project-one-5c61e.appspot.com",
  messagingSenderId: "529608401459",
  appId: "1:529608401459:web:d478bf2d0aabe285c87946"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let phone = localStorage.getItem("userPhone");

async function loadBalance(){
  const q = query(collection(db, "users"), where("phone", "==", phone));
  const snapshot = await getDocs(q);

  snapshot.forEach((docSnap) => {
    document.getElementById("balance").innerText = docSnap.data().balance;
    window.userDocId = docSnap.id;
  });
}

window.earn = async function(){

  let newBalance = parseInt(document.getElementById("balance").innerText) + 10;

  await updateDoc(doc(db, "users", window.userDocId), {
    balance: newBalance
  });

  document.getElementById("balance").innerText = newBalance;
}

loadBalance();

</script>

</body>
</html>

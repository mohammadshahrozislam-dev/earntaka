<!DOCTYPE html>
<html>
<body>

<h2>Dashboard 😈</h2>

<p>Balance: $<span id="balance">0</span></p>

<button onclick="earn()">Earn +1$</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfl7V_-yp5HvfUd00h-RTdNmvXNu7I37o",
  authDomain: "project-one-5c61e.firebaseapp.com",
  projectId: "project-one-5c61e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let phone = localStorage.getItem("userPhone");

async function load(){
  const q = query(collection(db,"users"), where("phone","==",phone));
  const snap = await getDocs(q);

  snap.forEach(d=>{
    document.getElementById("balance").innerText = d.data().balance;
    window.docId = d.id;
  });
}

load();

window.earn = async function(){
  let b = parseInt(document.getElementById("balance").innerText) + 1;

  await updateDoc(doc(db,"users",window.docId),{
    balance: b
  });

  document.getElementById("balance").innerText = b;
};

</script>

</body>
</html>

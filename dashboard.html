<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
  background-size: 400% 400%;
  animation: bgMove 10s infinite alternate;
  color: white;
  text-align: center;
}

@keyframes bgMove {
  0% { background-position: left; }
  100% { background-position: right; }
}

/* HEADER */
.header {
  padding: 15px;
  background: rgba(0,0,0,0.3);
}

.balance {
  color: #00ffc3;
  font-size: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  margin: 15px;
  display: inline-block;
  width: 180px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

button {
  padding: 10px;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color: white;
  border: none;
  border-radius: 8px;
}

/* GRAPH */
#graph {
  width: 100%;
  height: 300px;
}
</style>

</head>

<body>

<div class="header">
<h2>📊 Trading Dashboard</h2>
<p class="balance" id="balance">Balance: $100</p>
</div>

<div class="card">
<h3>VIP ELITE</h3>
<p id="p1">$3.00</p>
<button onclick="buy(3)">Buy</button>
</div>

<div class="card">
<h3>PRO TRADER</h3>
<p id="p2">$2.00</p>
<button onclick="buy(2)">Buy</button>
</div>

<div class="card">
<h3>STARTER</h3>
<p id="p3">$1.00</p>
<button onclick="buy(1)">Buy</button>
</div>

<canvas id="graph"></canvas>

<script>
var balance = 100;
var prices = [3,2,1];

function updatePrices() {
  for(let i=0;i<prices.length;i++) {
    var up = Math.random() > 0.5;

    if(up) {
      prices[i] += Math.random()*0.15;
    } else {
      prices[i] -= 0.10;
    }

    if(prices[i] < 0.5) prices[i] = 0.5;

    document.getElementById("p"+(i+1)).innerText =
      "$" + prices[i].toFixed(2);
  }
}

function buy(price) {
  if(balance >= price) {
    balance -= price;
    document.getElementById("balance").innerText =
      "Balance: $" + balance.toFixed(2);
    alert("Purchase successful!");
  } else {
    alert("Not enough balance!");
  }
}

// GRAPH
var canvas = document.getElementById("graph");
var ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = 300;

var data = [];
for(let i=0;i<100;i++) data.push(150);

function drawGraph() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.strokeStyle = "#00ffc3";

  for(let i=0;i<data.length;i++) {
    ctx.lineTo(i*10, data[i]);
  }

  ctx.stroke();

  data.shift();
  var last = data[data.length-1];
  data.push(last + (Math.random()*10-5));
}

setInterval(function(){
  updatePrices();
  drawGraph();
},1000);
</script>

</body>
</html>

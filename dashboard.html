<!DOCTYPE html>
<html>
<head>
<title>Pro Trading Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0e11;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #161a1e;
  padding: 10px;
}

.sidebar h3 {
  color: #f0b90b;
  text-align: center;
}

.company {
  font-size: 12px;
  margin: 5px 0;
}

.green { color: #00ff88; }
.red { color: red; }

/* MAIN */
.main {
  flex: 1;
  padding: 10px;
}

/* HEADER */
.header {
  text-align: center;
  color: #f0b90b;
  margin-bottom: 10px;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
}

.card {
  background: #161a1e;
  margin: 10px;
  padding: 15px;
  width: 160px;
  text-align: center;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  background: #f0b90b;
  border: none;
}

/* ORDER BOOK */
.orderbook {
  display: flex;
  margin-top: 10px;
}

.buy, .sell {
  width: 50%;
  padding: 10px;
}

.buy p { color: #00ff88; }
.sell p { color: red; }
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h3>📊 Market Data</h3>

<div id="companies"></div>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">🔥 LIVE TRADING 🔥</div>

<div class="cards">

<div class="card">
ELITE
<p id="p1">$3.00</p>
<p id="s1" class="green">UP</p>
<button onclick="pay()">Buy</button>
</div>

<div class="card">
PREMIUM
<p id="p2">$2.00</p>
<p id="s2" class="green">UP</p>
<button onclick="pay()">Buy</button>
</div>

<div class="card">
BASIC
<p id="p3">$1.00</p>
<p id="s3" class="green">UP</p>
<button onclick="pay()">Buy</button>
</div>

</div>

<!-- CANDLE CHART -->
<div id="chart" style="height:400px;"></div>

<!-- ORDER BOOK -->
<div class="orderbook">
<div class="buy" id="buy"></div>
<div class="sell" id="sell"></div>
</div>

</div>

<script>

/* TRADING VIEW */
new TradingView.widget({
  "width": "100%",
  "height": 400,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "1",
  "theme": "dark",
  "style": "1",
  "container_id": "chart"
});

/* PRICE CONTROL */
var prices = [3,2,1];
var min = [2.90,1.95,1.00];
var max = [3.22,2.12,1.32];

function updatePrices() {
  for(let i=0;i<3;i++){
    let change = (Math.random()*0.15 - 0.10);
    prices[i] += change;

    if(prices[i] < min[i]) prices[i] = min[i];
    if(prices[i] > max[i]) prices[i] = max[i];

    document.getElementById("p"+(i+1)).innerText =
      "$" + prices[i].toFixed(2);

    let s = document.getElementById("s"+(i+1));

    if(change > 0){
      s.innerText = "▲ UP";
      s.className = "green";
    } else {
      s.innerText = "▼ DOWN";
      s.className = "red";
    }
  }
}

/* ORDER BOOK */
function updateOrderBook(){
  let buyHTML = "<h4>BUY</h4>";
  let sellHTML = "<h4>SELL</h4>";

  for(let i=0;i<12;i++){
    buyHTML += "<p>$"+(Math.random()*3).toFixed(2)+"</p>";
    sellHTML += "<p>$"+(Math.random()*3).toFixed(2)+"</p>";
  }

  document.getElementById("buy").innerHTML = buyHTML;
  document.getElementById("sell").innerHTML = sellHTML;
}

/* COMPANIES */
function updateCompanies(){
  let names = ["Binance","Bybit","KuCoin","OKX","Gate","Bitget","Huobi","Coinbase","Kraken","Bitfinex","MEXC","Deribit"];
  let html = "";

  for(let i=0;i<names.length;i++){
    let up = Math.random()>0.5;
    let val = (Math.random()*10).toFixed(2);

    html += "<div class='company "+(up?"green":"red")+"'>"
    + names[i] + " : " + (up?"+":"-") + val + "%</div>";
  }

  document.getElementById("companies").innerHTML = html;
}

/* BKASH */
function pay(){
  window.location.href = "https://www.bkash.com/";
}

setInterval(function(){
  updatePrices();
  updateOrderBook();
  updateCompanies();
},1000);

</script>

</body>
</html>

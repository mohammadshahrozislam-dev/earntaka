<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grassy Login</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
}

/* Header */
.header {
    background: #000;
    color: white;
    padding: 12px;
    text-align: center;
    font-size: 16px;
}

/* Container */
.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

/* Logo */
.logo {
    font-size: 40px;
    color: #00b894;
    margin: 20px 0;
}

/* Tabs */
.tabs {
    display: flex;
    margin-bottom: 20px;
}

.tab {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    background: #eee;
    cursor: pointer;
}

.tab.active {
    background: white;
    color: #00b894;
    font-weight: bold;
}

/* Input */
.input-group {
    margin: 10px 0;
}

input {
    width: 100%;
    padding: 12px;
    border: none;
    border-bottom: 1px solid #ccc;
    outline: none;
}

/* Button */
.btn {
    margin-top: 20px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 30px;
    background: #00b894;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Link */
.link {
    margin-top: 15px;
    font-size: 14px;
}

.link a {
    color: #00b894;
    text-decoration: none;
}

/* Box */
.box {
    background: white;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
    Grassy - Earn money so easy!
</div>

<div class="container">

    <h3 id="title">অ্যাকাউন্ট তৈরি করুন</h3>

    <div class="logo">b</div>

    <div class="tabs">
        <div class="tab active">ইমেইল</div>
        <div class="tab">ফোন</div>
    </div>

    <!-- REGISTER -->
    <div id="register" class="box">

        <div class="input-group">
            <input type="email" placeholder="ইমেইল">
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password">
        </div>

        <div class="input-group">
            <input type="password" placeholder="Confirm password">
        </div>

        <div class="input-group">
            <input type="text" value="Invitation Code: 7F9781AD">
        </div>

        <button class="btn">অ্যাকাউন্ট তৈরি করুন</button>

        <div class="link">
            ইতিমধ্যে একটি অ্যাকাউন্ট আছে?
            <a href="#" onclick="showLogin()">Sign In</a>
        </div>

    </div>

    <!-- LOGIN -->
    <div id="login" class="box" style="display:none;">

        <div class="input-group">
            <input type="email" placeholder="ইমেইল">
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password">
        </div>

        <button class="btn">Sign In</button>

        <div class="link">
            Don't have an account?
            <a href="#" onclick="showRegister()">অ্যাকাউন্ট তৈরি করুন</a>
        </div>

    </div>

</div>

<script>
function showLogin() {
    document.getElementById("register").style.display = "none";
    document.getElementById("login").style.display = "block";
    document.getElementById("title").innerText = "Sign In";
}

function showRegister() {
    document.getElementById("register").style.display = "block";
    document.getElementById("login").style.display = "none";
    document.getElementById("title").innerText = "অ্যাকাউন্ট তৈরি করুন";
}
</script>

</body>
</html>

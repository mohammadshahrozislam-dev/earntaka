<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>

<body>

<h2>Login</h2>

<input type="text" id="phone" placeholder="Phone"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// তোমার config
const firebaseConfig = {
  apiKey: "AIzaSyCfl7V_-yp5HvfUd00h-RTdNmvXNu7I37o",
  authDomain: "project-one-5c61e.firebaseapp.com",
  projectId: "project-one-5c61e",
  storageBucket: "project-one-5c61e.appspot.com",
  messagingSenderId: "529608401459",
  appId: "1:529608401459:web:d478bf2d0aabe285c87946"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function() {

  let phone = document.getElementById("phone").value;
  let password = document.getElementById("password").value;

  const q = query(
    collection(db, "users"),
    where("phone", "==", phone),
    where("password", "==", password)
  );

  const querySnapshot = await getDocs(q);

  if(querySnapshot.empty){
    alert("Wrong login!");
  } else {
    alert("Login success");

    localStorage.setItem("userPhone", phone);

    window.location.href = "dashboard.html";
  }
}

</script>

</body>
</html>
